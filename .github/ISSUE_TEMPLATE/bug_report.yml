name: Bug report
description: Something is broken or behaves unexpectedly
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. Note: this project is pre-implementation, so most "bug" reports right now will actually be plan / design / docs / research issues. That's fine — file them and we'll re-label.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you do, what did you expect, what actually happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Include commands, config, and observed output.
      placeholder: |
        1. Run `make demo`
        2. Open http://localhost:8080/demo
        3. Click "Trigger synthetic incident"
        4. Observe: ...
        5. Expected: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or release tag
      placeholder: "e.g. v0.1.3 or commit a8c5b75"

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, Docker version, Android version (if mobile)
      placeholder: "e.g. macOS 14.5, Go 1.22, Docker 25.0, Android 14"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste error output, stack traces, dispatcher logs. Use code blocks. Redact any PII.
      render: shell

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      description: Required before submission
      options:
        - label: I have redacted all PII (phone numbers, real names, real GPS coordinates of real people, real provider credentials)
          required: true
